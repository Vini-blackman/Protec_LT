<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SEP - Sistema de Engenharia de Proteção para cálculo de proteção de linhas de transmissão" />
    <meta name="keywords" content="proteção, relé, linha de transmissão, engenharia elétrica, SEP" />
    <meta name="author" content="SEP Team" />
    <title>SEP - Sistema de Engenharia de Proteção</title>
    <style>
      /* Loading screen */
      #loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      #loading .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid #21262d;
        border-top-color: #f97316;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      #loading p {
        margin-top: 20px;
        color: #8b949e;
        font-family: system-ui, -apple-system, sans-serif;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <div class="spinner"></div>
      <p>Carregando SEP...</p>
    </div>
    <div id="root"></div>
    <script>
      // Remove loading screen when React loads
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loading = document.getElementById('loading');
          if (loading) loading.style.display = 'none';
        }, 500);
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
