<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEP - Sistema de Engenharia de Proteção</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d1117; color: #e6edf3; font-family: system-ui, sans-serif; min-height: 100vh; }
    #loading {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #0d1117; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 9999;
    }
    .spinner { width: 50px; height: 50px; border: 4px solid #21262d; border-top-color: #f97316; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { margin-top: 20px; color: #8b949e; }
  </style>
</head>
<body>
  <div id="loading"><div class="spinner"></div><p>Carregando SEP...</p></div>
  <div id="root"></div>

  <!-- CDN Scripts -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide-react@0.263.1/dist/umd/lucide-react.min.js"></script>

  <!-- App -->
  <script type="text/babel" src="sep-app.jsx"></script>
  
  <!-- Render -->
  <script type="text/babel">
    setTimeout(() => {
      try {
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SEPApp />);
        document.getElementById('loading').style.display = 'none';
      } catch(e) {
        document.getElementById('loading').innerHTML = '<h2 style="color:#f97316">Erro ao carregar</h2><p style="color:#8b949e;margin-top:10px">Abra o console (F12) para detalhes</p>';
        console.error(e);
      }
    }, 2000);
  </script>
</body>
</html>
